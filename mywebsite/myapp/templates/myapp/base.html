<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex F1 Hub</title>
    <style>
        :root {
            --f1-red: #e10600;
            --dark-bg: #000000;
            --card-bg: #000000;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            line-height: 1.6;
        }

        a {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.3s;
        }
        
        a:hover {
            color: var(--f1-red);
        }

        /* Navigation */
        header {
            background-color: #000;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--f1-red);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            font-style: italic;
            letter-spacing: 2px;
        }

        .logo a {
            color: var(--text-main);
        }

        .logo span {
            color: var(--f1-red);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        nav a.nav-link {
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        nav a.nav-link:hover {
            color: var(--f1-red);
        }
        
        .auth-bar {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Page Layout */
        main {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            background-color: #333;
            border-left: 5px solid var(--f1-red);
        }

        /* Component Styles */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            border-left: 5px solid var(--f1-red);
            padding-left: 15px;
        }

        h2 {
            font-size: 1.8rem;
            margin: 1.5rem 0 1rem;
            color: var(--text-muted);
        }

        .btn {
            background: var(--f1-red);
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }

        .btn:hover {
            background: darkred;
            color: white;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 1.5rem;
        }

        .card {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border: 1px solid #333;
            border-top: 3px solid var(--f1-red);
            transition: transform 0.3s, border-color 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--f1-red);
        }

        .card h3 {
            margin-bottom: 0.5rem;
            font-size: 1.4rem;
            color: var(--f1-red);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            background-color: var(--card-bg);
            overflow: hidden;
            border: 1px solid #333;
        }

        .data-table th, .data-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        .data-table th {
            background-color: #000;
            color: var(--f1-red);
            text-transform: uppercase;
            border-bottom: 2px solid var(--f1-red);
        }

        .data-table tr:hover {
            background-color: #111;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        input[type="text"], input[type="password"], input[type="number"], select {
            width: 100%;
            padding: 10px;
            background: #333;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
        }

        .errorlist {
            color: var(--f1-red);
            list-style: none;
            margin-bottom: 5px;
            font-size: 0.9rem;
            padding: 0;
        }
        
        .helptext {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: block;
            margin-top: 5px;
            line-height: 1.3;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><a href="{% url 'home' %}">APEX<span>F1</span></a></div>
        <nav>
            <ul>
                <li><a href="{% url 'home' %}" class="nav-link">Paddock</a></li>
                <li><a href="{% url 'quiz' %}" class="nav-link">AI Quiz</a></li>
                <li class="auth-bar">
                    {% if user.is_authenticated %}
                        Welcome, {{ user.username }}! | 
                        <form method="post" action="{% url 'logout' %}" style="display:inline;">
                            {% csrf_token %}
                            <button type="submit" style="background:none; border:none; color:var(--text-main); cursor:pointer;">Logout</button>
                        </form>
                    {% else %}
                        <a href="{% url 'login' %}">Login</a> | <a href="{% url 'register' %}">Register</a>
                    {% endif %}
                </li>
            </ul>
        </nav>
    </header>

    <main>
        {% if messages %}
            {% for message in messages %}
                <div class="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
