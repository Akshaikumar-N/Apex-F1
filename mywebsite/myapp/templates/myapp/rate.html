{% extends "myapp/base.html" %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h1>Rate a Driver</h1>
    <h2>{{ driver.name }} ({{ driver.team.name }})</h2>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Save Rating</button>
    </form>
</div>
{% endblock %}
